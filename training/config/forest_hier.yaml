name: forest_hier
bands: [backscatter, bathymetry, slope]

split:
  mode: spatial_blocks
  polygons: [polygon1, polygon3, polygon4, polygon5, polygon6, polygon7]
  use_augmented_for_train: false

forest:
  models: [random_forest, hist_gradient_boosting]
  seed: 42
  max_pixels_per_class: null
  dedup_overlap: true
  majority_filter_size: 0
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 1
    n_jobs: -1
    class_weight: balanced
  hist_gradient_boosting:
    learning_rate: 0.1
    max_iter: 300
    max_leaf_nodes: 31
    l2_regularization: 0.0
    early_stopping: true
  spatial:
    enabled: false
