# Per-pixel tree baseline (RF + HistGradientBoosting) on the same 3 bands as the U-Net,
# trained on five surveys (polygon1/3/4/5/6). Backscatter keeps per-polygon normalization
# (bridges the grayscale-vs-dB domain shift); bathymetry/slope stay global (scale-invariant
# for trees, kept for parity). Augmentation (_rotaug) is never used: flips/rotations add no
# information to a context-free per-pixel model. See the design spec for rationale.
name: forest_3band
bands: [backscatter, bathymetry, slope]

split:
  mode: spatial_blocks
  polygons: [polygon1, polygon3, polygon4, polygon5, polygon6, polygon7]
  use_augmented_for_train: false   # forest trains on base _rot tiles only

forest:
  models: [random_forest, hist_gradient_boosting]
  seed: 42
  max_pixels_per_class: null       # null = use all valid train pixels
  dedup_overlap: true              # collapse the 50% tile overlap by world coordinate
  majority_filter_size: 0          # 0 = off; set to an odd N>1 to smooth prediction maps
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 1
    n_jobs: -1
    class_weight: balanced
  hist_gradient_boosting:
    learning_rate: 0.1
    max_iter: 300
    max_leaf_nodes: 31
    l2_regularization: 0.0
    early_stopping: true
  spatial:                           # edge-aware guided-filter regularization of the posterior
    enabled: true                    # gates the spatial LOPO pass in crossval
    method: guided
    radius: 4                        # box radius -> 9x9 window
    eps: 0.001                       # guided-filter regularization (probs/guide in [0,1])
    guide_band: bathymetry           # depth edges guide the smoothing (top RF/HGB importance)
