# polygon1 — the reference pipeline. Only polygon with real measured .xyz layers
# (bathymetry, slope) plus a clean polygon shapefile of the 3 classes.

name: polygon1
src_dir: DataBase/polygon1

# Band order of the output multiband feature GeoTIFF.
band_order: [backscatter, bathymetry, slope]

layers:
  # Backscatter is only available as a 0.2 m RGB render (no .xyz). Converted to a single
  # grayscale intensity band and downsampled (average) to the 0.5 m master grid.
  - name: backscatter
    kind: raster_jpg
    path: "Back scatter 0.2m.jpg"
    to_gray: true
    resampling: average

  # Real measured values, native 0.5 m. Coverage is sparse (~half the bounding box);
  # missing cells become feature_nodata.
  # cmap/hillshade only affect the JPEG previews (to_jpg / stitch), not the GeoTIFFs.
  - name: bathymetry
    kind: xyz
    path: "bathymetry Grid 0.5m.xyz"
    native_res_m: 0.5
    cmap: summer          # green (deep) -> yellow (shallow), like the original render
    hillshade: true       # relief shading to match the hillshaded original
    vert_exag: 5.0

  - name: slope
    kind: xyz
    path: "Slope  Grid 0.5m.xyz"
    native_res_m: 0.5
    cmap: YlOrRd          # yellow (low slope) -> red (steep), like the original render

labels:
  kind: shapefile
  path: "3 classes.shp"
  name_field: NAME
  # Class ids written into the label band.
  classes:
    rock: 1
    shallow_rock: 2
    sand: 3
  # Burn order (low -> high): rock wins on overlap, matching the per-class convention.
  # The default (classes order) would burn rock first and let sand/shallow overwrite it.
  priority: [sand, shallow_rock, rock]
  # Rules are applied IN ORDER to the normalized NAME (lowercased, whitespace collapsed).
  # "shallow" must come before "rock" so "shallow rock" is not caught by the rock rule.
  rules:
    - {pattern: "shallow", class: shallow_rock}
    - {pattern: "rock",    class: rock}
    - {pattern: "sand",    class: sand}
    # One feature's class name was overwritten by its area string; it sits among the
    # rock blobs, so recover it as rock (raw shapefile is read-only). Exact literal so
    # it cannot capture other annotations.
    - {pattern: "0\\.00501 sq km", class: rock}
